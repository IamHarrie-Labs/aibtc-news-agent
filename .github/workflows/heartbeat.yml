name: Serene Spring Heartbeat

on:
  schedule:
    # Every 4 minutes (within AIBTC's 5-min window)
    - cron: "*/4 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (no API call, just log)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    env:
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
      WALLET_ENCRYPTED: ${{ secrets.WALLET_ENCRYPTED }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install -g @aibtc/mcp-server@latest

      - name: Create wallet file
        run: |
          mkdir -p ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1
          echo "${{ secrets.WALLET_ENCRYPTED }}" | base64 -d > ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1/keystore.json

      - name: Send heartbeat
        timeout-minutes: 1
        run: |
          node - <<'EOF'
          const https = require('https');
          const { spawn } = require('child_process');

          const BTC_ADDRESS = process.env.BTC_ADDRESS;
          const WALLET_PASSWORD = process.env.WALLET_PASSWORD;
          const WALLET_ID = 'e0704dea-0eca-4a02-a964-b7259606cbc1';
          const TEST_MODE = process.env.TEST_MODE === 'true';

          const now = new Date().toISOString();
          const message = `AIBTC Check-In | ${now}`;

          console.log(`[heartbeat] ${now}`);
          console.log(`[heartbeat] Message: ${message}`);

          if (TEST_MODE) {
            console.log('[heartbeat] TEST MODE - skipping API call');
            process.exit(0);
          }

          const proc = spawn('npx', ['@aibtc/mcp-server@latest'], {
            env: { ...process.env, NETWORK: 'mainnet' },
            stdio: ['pipe', 'pipe', 'pipe']
          });

          let out = '';
          let unlocked = false;

          proc.stdout.on('data', (data) => {
            const chunk = data.toString();
            out += chunk;
            console.log('[mcp-stdout]', chunk.slice(0, 100));

            // Check for unlock success text
            if (!unlocked && out.includes('unlocked successfully')) {
              unlocked = true;
              console.log('[mcp] Wallet unlocked');
              // Send sign request
              proc.stdin.write(JSON.stringify({
                jsonrpc: '2.0',
                id: 2,
                method: 'tools/call',
                params: {
                  name: 'btc_sign_message',
                  arguments: { message: message }
                }
              }) + '\n');
            }
          });

          proc.stderr.on('data', (data) => {
            const chunk = data.toString();
            console.error('[mcp-stderr]', chunk.slice(0, 200));
          });

          proc.on('close', () => {
            // Parse all output lines to find signature
            const lines = out.split('\n');
            for (const line of lines) {
              try {
                const j = JSON.parse(line);
                if (j.id === 2 && j.result) {
                  const text = j.result?.content?.[0]?.text;
                  if (text) {
                    const inner = JSON.parse(text);
                    if (inner.signature) {
                      const sig = inner.signature;
                      console.log(`[mcp] Signature captured (${sig.substring(0, 20)}...)`);
                      sendHeartbeat(sig, now);
                      return;
                    }
                  }
                }
              } catch (e) {}
            }
            console.error('[heartbeat] Failed to get signature');
            process.exit(1);
          });

          // Send initialize after waiting for server startup
          setTimeout(() => {
            console.log('[mcp] Sending initialize...');
            proc.stdin.write(JSON.stringify({
              jsonrpc: '2.0',
              id: 0,
              method: 'initialize',
              params: {
                protocolVersion: '2024-11-05',
                capabilities: {},
                clientInfo: { name: 'serene-spring-heartbeat', version: '1.0' }
              }
            }) + '\n');
          }, 2000);

          // Send unlock after server processes initialize
          setTimeout(() => {
            console.log('[mcp] Sending unlock...');
            proc.stdin.write(JSON.stringify({
              jsonrpc: '2.0',
              id: 1,
              method: 'tools/call',
              params: {
                name: 'wallet_unlock',
                arguments: { walletId: WALLET_ID, password: WALLET_PASSWORD }
              }
            }) + '\n');
          }, 3500);

          // Timeout protection
          setTimeout(() => {
            console.error('[heartbeat] MCP timeout after 30s');
            proc.kill();
            process.exit(1);
          }, 30000);

          function sendHeartbeat(signature, timestamp) {
            const payload = JSON.stringify({
              signature: signature,
              timestamp: timestamp,
              btcAddress: BTC_ADDRESS
            });

            const options = {
              hostname: 'aibtc.com',
              path: '/api/heartbeat',
              method: 'POST',
              headers: {
                'Content-Type': 'application/json',
                'Content-Length': payload.length
              }
            };

            console.log('[api] Sending heartbeat to aibtc.com/api/heartbeat');

            const req = https.request(options, (res) => {
              let data = '';
              res.on('data', chunk => { data += chunk; });
              res.on('end', () => {
                try {
                  const parsed = JSON.parse(data);
                  if (parsed.success) {
                    const count = parsed.checkIn?.checkInCount || '?';
                    console.log(`[api] ✓ Heartbeat OK - checkInCount: ${count}`);
                    process.exit(0);
                  } else {
                    console.error('[api] Heartbeat failed:', parsed.error || 'unknown error');
                    process.exit(1);
                  }
                } catch (e) {
                  console.error('[api] Invalid response:', data.slice(0, 200));
                  process.exit(1);
                }
              });
            });

            req.on('error', (e) => {
              console.error('[api] Request error:', e.message);
              process.exit(1);
            });

            req.write(payload);
            req.end();

            // Timeout protection
            setTimeout(() => {
              console.error('[api] Timeout after 20s');
              process.exit(1);
            }, 20000);
          }
          EOF

      - name: Log summary
        if: always()
        run: |
          echo "Heartbeat run complete at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
