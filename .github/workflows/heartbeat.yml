name: Serene Spring Heartbeat

on:
  schedule:
    # Every 4 minutes (within AIBTC's 5-min window)
    - cron: "*/4 * * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    env:
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP server
        run: npm install -g @aibtc/mcp-server@latest

      - name: Send heartbeat
        run: |
          node - <<'EOF'
          const https = require('https');
          const { spawn } = require('child_process');
          const readline = require('readline');

          const BTC_ADDRESS = process.env.BTC_ADDRESS;
          const WALLET_MNEMONIC = process.env.WALLET_MNEMONIC;

          // Use promise-based MCP client that keeps one connection open
          async function runHeartbeat() {
            const ts = new Date().toISOString();
            const msg = `AIBTC Check-In | ${ts}`;
            console.log(`[${ts}] Starting...`);

            const result = await new Promise((resolve, reject) => {
              const proc = spawn('aibtc-mcp-server', [], {
                stdio: ['pipe', 'pipe', 'pipe'],
                env: {
                  ...process.env,
                  NETWORK: 'mainnet',
                  CLIENT_MNEMONIC: WALLET_MNEMONIC
                }
              });

              proc.stderr.on('data', d => process.stderr.write(d));

              let output = '';
              let reqId = 1;
              const pending = {};

              function send(method, params) {
                return new Promise((res, rej) => {
                  const id = reqId++;
                  pending[id] = { res, rej };
                  proc.stdin.write(JSON.stringify({ jsonrpc: '2.0', id, method, params }) + '\n');
                  setTimeout(() => {
                    if (pending[id]) { delete pending[id]; rej(new Error(`Timeout: ${method}`)); }
                  }, 8000);
                });
              }

              const rl = readline.createInterface({ input: proc.stdout });
              rl.on('line', (line) => {
                if (!line.trim() || !line.startsWith('{')) return;
                try {
                  const msg = JSON.parse(line);
                  if (msg.id && pending[msg.id]) {
                    pending[msg.id].res(msg.result || msg);
                    delete pending[msg.id];
                  }
                } catch(e) {}
              });

              proc.on('error', reject);

              // Run sequence after server starts
              setTimeout(async () => {
                try {
                  // 1. Initialize
                  await send('initialize', {
                    protocolVersion: '2024-11-05',
                    capabilities: {},
                    clientInfo: { name: 'serene-spring', version: '1' }
                  });
                  await send('notifications/initialized', {});
                  console.log('[mcp] Initialized');

                  // 2. Import wallet from mnemonic, extract wallet ID
                  const imported = await send('tools/call', {
                    name: 'wallet_import',
                    arguments: { name: 'serene-spring', mnemonic: WALLET_MNEMONIC }
                  });
                  const importText = imported?.content?.[0]?.text || '';
                  const walletIdMatch = importText.match(/"id"\s*:\s*"([^"]+)"/);
                  const walletId = walletIdMatch ? walletIdMatch[1] : null;
                  console.log('[mcp] Wallet imported, id:', walletId || '(not found in: ' + importText.slice(0,100) + ')');

                  // 3. Unlock the wallet
                  if (walletId) {
                    await send('tools/call', {
                      name: 'wallet_unlock',
                      arguments: { walletId, password: process.env.WALLET_PASSWORD || 'lesh1234' }
                    });
                    console.log('[mcp] Wallet unlocked');
                  }

                  // 4. Sign message
                  const signResult = await send('tools/call', {
                    name: 'btc_sign_message',
                    arguments: { message: msg }
                  });

                  const text = signResult?.content?.[0]?.text || '';
                  const sigMatch = text.match(/"signature"\s*:\s*"([^"]+)"/) ||
                                   text.match(/signature.*?\\"([^\\"]+)\\"/);

                  if (!sigMatch) {
                    console.error('[mcp] Sign output:', text.slice(0, 300));
                    throw new Error('No signature in response');
                  }

                  proc.kill();
                  resolve({ signature: sigMatch[1], ts });
                } catch(err) {
                  proc.kill();
                  reject(err);
                }
              }, 400);

              setTimeout(() => {
                if (Object.keys(pending).length > 0) {
                  proc.kill();
                  reject(new Error('Overall timeout'));
                }
              }, 25000);
            });

            console.log(`[${result.ts}] Signed (${result.signature.substring(0,20)}...)`);

            // POST to heartbeat API
            const payload = JSON.stringify({
              signature: result.signature,
              timestamp: result.ts,
              btcAddress: BTC_ADDRESS
            });

            return new Promise((resolve) => {
              const req = https.request({
                hostname: 'aibtc.com',
                path: '/api/heartbeat',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(payload)
                }
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try {
                    const r = JSON.parse(data);
                    if (r.success) {
                      console.log(`[${result.ts}] ✓ checkInCount: ${r.checkIn?.checkInCount || '?'}`);
                      resolve(true);
                    } else {
                      console.error(`[${result.ts}] ⚠️ ${r.error?.message || JSON.stringify(r.error)}`);
                      resolve(false);
                    }
                  } catch(e) {
                    console.error(`Invalid response: ${data.slice(0, 300)}`);
                    resolve(false);
                  }
                });
              });
              req.on('error', e => { console.error(e.message); resolve(false); });
              req.write(payload);
              req.end();
            });
          }

          runHeartbeat().then(ok => process.exit(ok ? 0 : 1)).catch(err => {
            console.error('Fatal:', err.message);
            process.exit(1);
          });
          EOF

      - name: Log summary
        if: always()
        run: echo "Heartbeat run complete at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
