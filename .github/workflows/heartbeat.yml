name: Serene Spring Heartbeat

on:
  schedule:
    # Start a new 2-hour loop every 2 hours - reliable cron vs every-4-min
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 119  # Max 2-hour loop

    env:
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}

    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install MCP server
        run: npm install -g @aibtc/mcp-server@latest

      - name: Heartbeat loop (every 5 min for 2 hours)
        run: |
          cat > /tmp/heartbeat.js << 'JSEOF'
          const https = require('https');
          const { spawn } = require('child_process');
          const readline = require('readline');

          const BTC_ADDRESS = process.env.BTC_ADDRESS;
          const WALLET_MNEMONIC = process.env.WALLET_MNEMONIC;
          const WALLET_PASSWORD = process.env.WALLET_PASSWORD;

          async function runHeartbeat() {
            const ts = new Date().toISOString();
            const msg = `AIBTC Check-In | ${ts}`;

            const result = await new Promise((resolve, reject) => {
              const proc = spawn('aibtc-mcp-server', [], {
                stdio: ['pipe', 'pipe', 'pipe'],
                env: {
                  ...process.env,
                  NETWORK: 'mainnet',
                  CLIENT_MNEMONIC: WALLET_MNEMONIC
                }
              });

              proc.stderr.on('data', () => {});

              let reqId = 1;
              const pending = {};

              function send(method, params) {
                return new Promise((res, rej) => {
                  const id = reqId++;
                  pending[id] = { res, rej };
                  proc.stdin.write(JSON.stringify({ jsonrpc: '2.0', id, method, params }) + '\n');
                  setTimeout(() => {
                    if (pending[id]) { delete pending[id]; rej(new Error(`Timeout: ${method}`)); }
                  }, 8000);
                });
              }

              const rl = readline.createInterface({ input: proc.stdout });
              rl.on('line', (line) => {
                if (!line.trim() || !line.startsWith('{')) return;
                try {
                  const msg = JSON.parse(line);
                  if (msg.id && pending[msg.id]) {
                    pending[msg.id].res(msg.result || msg);
                    delete pending[msg.id];
                  }
                } catch(e) {}
              });

              proc.on('error', reject);

              setTimeout(async () => {
                try {
                  await send('initialize', {
                    protocolVersion: '2024-11-05', capabilities: {},
                    clientInfo: { name: 'serene-spring', version: '1' }
                  });
                  await send('notifications/initialized', {});
                  await send('tools/call', {
                    name: 'wallet_import',
                    arguments: { name: 'serene-spring', mnemonic: WALLET_MNEMONIC, password: WALLET_PASSWORD, network: 'mainnet' }
                  });
                  await send('tools/call', {
                    name: 'wallet_unlock',
                    arguments: { password: WALLET_PASSWORD }
                  });
                  const signResult = await send('tools/call', {
                    name: 'btc_sign_message',
                    arguments: { message: msg }
                  });
                  const text = signResult?.content?.[0]?.text || '';
                  const sigMatch = text.match(/"signature"\s*:\s*"([^"]+)"/) ||
                                   text.match(/signature.*?\\"([^\\"]+)\\"/);
                  if (!sigMatch) throw new Error('No signature in: ' + text.slice(0, 100));
                  proc.kill();
                  resolve({ signature: sigMatch[1], ts });
                } catch(err) {
                  proc.kill();
                  reject(err);
                }
              }, 400);

              setTimeout(() => { proc.kill(); reject(new Error('Overall timeout')); }, 20000);
            });

            const payload = JSON.stringify({
              signature: result.signature,
              timestamp: result.ts,
              btcAddress: BTC_ADDRESS
            });

            return new Promise((resolve) => {
              const req = https.request({
                hostname: 'aibtc.com', path: '/api/heartbeat', method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Content-Length': Buffer.byteLength(payload) }
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try {
                    const r = JSON.parse(data);
                    if (r.success) {
                      process.stdout.write(`[${result.ts}] checkInCount: ${r.checkIn?.checkInCount || '?'}\n`);
                      resolve(true);
                    } else {
                      process.stdout.write(`[${result.ts}] WARN: ${r.error?.message || JSON.stringify(r.error)}\n`);
                      resolve(false);
                    }
                  } catch(e) {
                    process.stdout.write(`[${result.ts}] ERROR: ${data.slice(0, 100)}\n`);
                    resolve(false);
                  }
                });
              });
              req.on('error', e => { process.stdout.write(`ERROR: ${e.message}\n`); resolve(false); });
              req.write(payload);
              req.end();
            });
          }

          runHeartbeat().then(ok => process.exit(ok ? 0 : 1)).catch(err => {
            process.stderr.write('Fatal: ' + err.message + '\n');
            process.exit(1);
          });
          JSEOF

          # Loop: 24 heartbeats over ~2 hours (every 5 minutes)
          for i in $(seq 1 24); do
            echo "--- Heartbeat $i/24 at $(date -u +'%H:%M:%S UTC') ---"
            node /tmp/heartbeat.js || echo "Heartbeat $i failed, continuing..."
            if [ $i -lt 24 ]; then
              sleep 300  # 5 minutes between beats
            fi
          done
          echo "Loop complete: 24 heartbeats sent"
