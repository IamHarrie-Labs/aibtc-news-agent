name: Serene Spring Heartbeat

on:
  schedule:
    # Every 4 minutes (within AIBTC's 5-min window)
    - cron: "*/4 * * * *"
  workflow_dispatch:
    inputs:
      test_mode:
        description: "Test mode (no API call, just log)"
        required: false
        default: "false"

permissions:
  contents: read

jobs:
  heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 2

    env:
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
      WALLET_ENCRYPTED: ${{ secrets.WALLET_ENCRYPTED }}
      WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install -g @aibtc/mcp-server@latest

      - name: Create wallet file
        run: |
          mkdir -p ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1
          echo "${{ secrets.WALLET_ENCRYPTED }}" | base64 -d > ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1/keystore.json

      - name: Send heartbeat
        run: |
          node - <<'EOF'
          const https = require('https');
          const { spawn } = require('child_process');
          const readline = require('readline');

          const BTC_ADDRESS = process.env.BTC_ADDRESS;
          const WALLET_PASSWORD = process.env.WALLET_PASSWORD;
          const WALLET_MNEMONIC = process.env.WALLET_MNEMONIC;
          const WALLET_ID = 'e0704dea-0eca-4a02-a964-b7259606cbc1';

          async function mcpSingleCall(tool, args) {
            return new Promise((resolve) => {
              // Use globally installed binary - avoids npx re-download delay
              const proc = spawn('aibtc-mcp-server', [], {
                stdio: ['pipe', 'pipe', 'pipe'],
                env: { ...process.env, CLIENT_MNEMONIC: WALLET_MNEMONIC }
              });

              let output = '';
              const rl = readline.createInterface({ input: proc.stdout });
              rl.on('line', (l) => { output += l + '\n'; });
              proc.stderr.on('data', (d) => {
                process.stderr.write(d); // Show MCP server logs
              });

              // Server is already installed, starts in ~100ms
              setTimeout(() => {
                proc.stdin.write(JSON.stringify({
                  jsonrpc: '2.0', id: 0, method: 'initialize',
                  params: { protocolVersion: '2024-11-05', capabilities: {}, clientInfo: { name: 'serene-spring', version: '1' } }
                }) + '\n');
              }, 300);

              setTimeout(() => {
                proc.stdin.write(JSON.stringify({
                  jsonrpc: '2.0', id: 1, method: 'tools/call',
                  params: { name: tool, arguments: args || {} }
                }) + '\n');
              }, 800);

              // Give 6s for tool response before kill
              setTimeout(() => { proc.kill(); resolve(output); }, 6000);
            });
          }

          async function heartbeat() {
            const ts = new Date().toISOString();
            const msg = `AIBTC Check-In | ${ts}`;

            console.log(`[${ts}] Starting heartbeat...`);

            // 1. Unlock wallet
            const unlockOut = await mcpSingleCall('wallet_unlock', { walletId: WALLET_ID, password: WALLET_PASSWORD });
            if (!unlockOut.includes('Wallet unlocked successfully')) {
              console.error(`[${ts}] ❌ Unlock failed`);
              console.error(`Unlock output: ${unlockOut.slice(0, 500)}`);
              process.exit(1);
            }
            console.log(`[${ts}] ✓ Wallet unlocked`);

            // 2. Sign message
            const sigOut = await mcpSingleCall('btc_sign_message', { message: msg });
            const sigMatch = sigOut.match(/signature.*?\\"([^\\"]+)\\"/);
            if (!sigMatch) {
              console.error(`[${ts}] ❌ Sign failed`);
              console.error(`Sign output: ${sigOut.slice(0, 500)}`);
              process.exit(1);
            }
            console.log(`[${ts}] ✓ Message signed`);

            // 3. Send heartbeat to API
            const payload = JSON.stringify({
              signature: sigMatch[1],
              timestamp: ts,
              btcAddress: BTC_ADDRESS
            });

            return new Promise((resolve) => {
              const req = https.request({
                hostname: 'aibtc.com',
                path: '/api/heartbeat',
                method: 'POST',
                headers: {
                  'Content-Type': 'application/json',
                  'Content-Length': Buffer.byteLength(payload)
                }
              }, (res) => {
                let data = '';
                res.on('data', c => data += c);
                res.on('end', () => {
                  try {
                    const r = JSON.parse(data);
                    if (r.success) {
                      const count = r.checkIn?.checkInCount || '?';
                      console.log(`[${ts}] ✓ Heartbeat OK - checkInCount: ${count}`);
                      resolve(true);
                    } else {
                      console.error(`[${ts}] ⚠️  ${r.error?.message || r.error || 'Unknown error'}`);
                      resolve(false);
                    }
                  } catch (e) {
                    console.error(`[${ts}] ❌ Invalid response: ${data.slice(0, 200)}`);
                    resolve(false);
                  }
                });
              });

              req.on('error', e => {
                console.error(`[${ts}] ❌ Request error: ${e.message}`);
                resolve(false);
              });

              req.write(payload);
              req.end();
            });
          }

          heartbeat().then(ok => process.exit(ok ? 0 : 1));
          EOF

      - name: Log summary
        if: always()
        run: |
          echo "Heartbeat run complete at $(date -u +'%Y-%m-%d %H:%M:%S UTC')"
