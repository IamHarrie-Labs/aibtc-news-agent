name: AIBTC News Agent

on:
  schedule:
    # 4 slots at start of UTC day — claim the beat cap BEFORE other correspondents
    - cron: "0 0 * * *"   # slot 1  — 00:00 UTC
    - cron: "0 1 * * *"   # slot 2  — 01:00 UTC
    - cron: "0 2 * * *"   # slot 3  — 02:00 UTC
    - cron: "0 3 * * *"   # slot 4  — 03:00 UTC
  workflow_dispatch:
    inputs:
      slot_override:
        description: "Force a specific slot (1-4). Leave blank to auto-detect from UTC hour."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  file-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      STX_ADDRESS: ${{ secrets.STX_ADDRESS }}
      WALLET_MNEMONIC: ${{ secrets.WALLET_MNEMONIC }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
      AGENT_BEAT: ${{ secrets.AGENT_BEAT }}
      AGENT_BEAT_SLUG: ${{ secrets.AGENT_BEAT_SLUG }}
      AGENT_PRIMARY_SKILL: ${{ secrets.AGENT_PRIMARY_SKILL }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install groq requests feedparser --quiet
          npm install -g @aibtc/mcp-server@latest --quiet

      - name: Detect slot from UTC hour
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot_override }}" ]; then
            echo "slot=${{ github.event.inputs.slot_override }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%-H)
            case $HOUR in
              0) echo "slot=1" >> $GITHUB_OUTPUT ;;
              1) echo "slot=2" >> $GITHUB_OUTPUT ;;
              2) echo "slot=3" >> $GITHUB_OUTPUT ;;
              3) echo "slot=4" >> $GITHUB_OUTPUT ;;
              *) echo "slot=0" >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Scrape news sources
        if: steps.slot.outputs.slot != '0'
        run: |
          python scripts/scrape_sources.py \
            --slot ${{ steps.slot.outputs.slot }} \
            --beat "$AGENT_BEAT" \
            --output raw_sources.json

      - name: Run agent -- research, fact-check, write, submit
        if: steps.slot.outputs.slot != '0'
        run: |
          python scripts/run_agent.py \
            --slot ${{ steps.slot.outputs.slot }} \
            --sources raw_sources.json \
            --beat "$AGENT_BEAT" \
            --primary-skill "$AGENT_PRIMARY_SKILL" \
            --btc-address "$BTC_ADDRESS" \
            --log news-log.md

      - name: Commit updated log
        if: steps.slot.outputs.slot != '0'
        run: |
          git config user.name "aibtc-news-agent"
          git config user.email "agent@noreply"
          NEW_ENTRY=$(git diff -- news-log.md | grep '^+' | grep -v '^+++' | sed 's/^+//')
          git fetch origin main
          git checkout origin/main -- news-log.md
          if [ -n "$NEW_ENTRY" ]; then
            printf '%s\n' "$NEW_ENTRY" >> news-log.md
          fi
          git add news-log.md
          git diff --cached --quiet || git commit -m "signal log: slot ${{ steps.slot.outputs.slot }} $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
