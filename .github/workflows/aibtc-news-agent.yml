name: AIBTC News Agent

# Fires at 07:05 UTC — 5 minutes after the platform's midnight-Pacific daily reset.
# All 4 beats are filed sequentially in one job, completing by ~07:20 UTC.
# Competing agents cluster at 07:49–08:31 UTC; this workflow is always first.

on:
  schedule:
    - cron: "5 7 * * *"   # 07:05 UTC daily — 44 min before first competitor
  workflow_dispatch:
    inputs:
      beats_override:
        description: "Comma-separated beats to file (e.g. 'bitcoin-macro,quantum'). Leave blank to run all 4."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  file-signals:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BTC_ADDRESS:       ${{ secrets.BTC_ADDRESS }}
      STX_ADDRESS:       ${{ secrets.STX_ADDRESS }}
      WALLET_MNEMONIC:   ${{ secrets.WALLET_MNEMONIC }}
      WALLET_PASSWORD:   ${{ secrets.WALLET_PASSWORD }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify ANTHROPIC_API_KEY is set
        run: |
          if [ -z "$ANTHROPIC_API_KEY" ]; then
            echo "ERROR: ANTHROPIC_API_KEY secret is not set."
            exit 1
          fi
          echo "ANTHROPIC_API_KEY: OK"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          pip install feedparser --quiet
          npm install -g @aibtc/mcp-server@latest --quiet

      # -----------------------------------------------------------------------
      # Compute beats for today. Slots 3 & 4 alternate by day-of-month parity.
      #   Even days: security + infrastructure
      #   Odd days:  governance + agent-economy
      # -----------------------------------------------------------------------
      - name: Compute today's beat rotation
        id: beats
        run: |
          DAY=$(date -u +%-d)
          EVEN=$((DAY % 2))
          if [ "$EVEN" -eq 0 ]; then
            BEAT3="security"
            BEAT4="infrastructure"
          else
            BEAT3="governance"
            BEAT4="agent-economy"
          fi
          echo "beat1=bitcoin-macro" >> $GITHUB_OUTPUT
          echo "beat2=quantum"       >> $GITHUB_OUTPUT
          echo "beat3=$BEAT3"        >> $GITHUB_OUTPUT
          echo "beat4=$BEAT4"        >> $GITHUB_OUTPUT
          echo "Today (day $DAY, even=$EVEN): bitcoin-macro | quantum | $BEAT3 | $BEAT4"

      # -----------------------------------------------------------------------
      # Slot 1 — bitcoin-macro
      # -----------------------------------------------------------------------
      - name: "Slot 1 — Scrape (bitcoin-macro)"
        run: |
          python scripts/scrape_sources.py \
            --slot 1 \
            --beat "${{ steps.beats.outputs.beat1 }}" \
            --output raw_sources_1.json

      - name: "Slot 1 — File signal (bitcoin-macro)"
        env:
          AGENT_BEAT_SLUG: ${{ steps.beats.outputs.beat1 }}
        run: |
          python scripts/run_agent.py \
            --slot         1 \
            --sources      raw_sources_1.json \
            --beat         "${{ steps.beats.outputs.beat1 }}" \
            --primary-skill "aibtc-news-signal" \
            --btc-address  "$BTC_ADDRESS" \
            --log          news-log.md

      # -----------------------------------------------------------------------
      # Slot 2 — quantum
      # -----------------------------------------------------------------------
      - name: "Slot 2 — Scrape (quantum)"
        run: |
          python scripts/scrape_sources.py \
            --slot 2 \
            --beat "${{ steps.beats.outputs.beat2 }}" \
            --output raw_sources_2.json

      - name: "Slot 2 — File signal (quantum)"
        env:
          AGENT_BEAT_SLUG: ${{ steps.beats.outputs.beat2 }}
        run: |
          python scripts/run_agent.py \
            --slot         2 \
            --sources      raw_sources_2.json \
            --beat         "${{ steps.beats.outputs.beat2 }}" \
            --primary-skill "aibtc-news-signal" \
            --btc-address  "$BTC_ADDRESS" \
            --log          news-log.md

      # -----------------------------------------------------------------------
      # Slot 3 — security (even days) / governance (odd days)
      # -----------------------------------------------------------------------
      - name: "Slot 3 — Scrape (${{ steps.beats.outputs.beat3 }})"
        run: |
          python scripts/scrape_sources.py \
            --slot 3 \
            --beat "${{ steps.beats.outputs.beat3 }}" \
            --output raw_sources_3.json

      - name: "Slot 3 — File signal (${{ steps.beats.outputs.beat3 }})"
        env:
          AGENT_BEAT_SLUG: ${{ steps.beats.outputs.beat3 }}
        run: |
          python scripts/run_agent.py \
            --slot         3 \
            --sources      raw_sources_3.json \
            --beat         "${{ steps.beats.outputs.beat3 }}" \
            --primary-skill "aibtc-news-signal" \
            --btc-address  "$BTC_ADDRESS" \
            --log          news-log.md

      # -----------------------------------------------------------------------
      # Slot 4 — infrastructure (even days) / agent-economy (odd days)
      # -----------------------------------------------------------------------
      - name: "Slot 4 — Scrape (${{ steps.beats.outputs.beat4 }})"
        run: |
          python scripts/scrape_sources.py \
            --slot 4 \
            --beat "${{ steps.beats.outputs.beat4 }}" \
            --output raw_sources_4.json

      - name: "Slot 4 — File signal (${{ steps.beats.outputs.beat4 }})"
        env:
          AGENT_BEAT_SLUG: ${{ steps.beats.outputs.beat4 }}
        run: |
          python scripts/run_agent.py \
            --slot         4 \
            --sources      raw_sources_4.json \
            --beat         "${{ steps.beats.outputs.beat4 }}" \
            --primary-skill "aibtc-news-signal" \
            --btc-address  "$BTC_ADDRESS" \
            --log          news-log.md

      # -----------------------------------------------------------------------
      # Commit the updated log (conflict-safe)
      # -----------------------------------------------------------------------
      - name: Commit updated signal log
        run: |
          git config user.name  "aibtc-news-agent"
          git config user.email "agent@noreply"
          NEW_LINES=$(git diff -- news-log.md | grep '^+' | grep -v '^+++' | sed 's/^+//')
          git fetch origin main
          git checkout origin/main -- news-log.md
          if [ -n "$NEW_LINES" ]; then
            printf '%s\n' "$NEW_LINES" >> news-log.md
          fi
          git add news-log.md
          git diff --cached --quiet || git commit -m "signal log: $(date -u +'%Y-%m-%d') beats=bitcoin-macro|quantum|${{ steps.beats.outputs.beat3 }}|${{ steps.beats.outputs.beat4 }}"
          git push
