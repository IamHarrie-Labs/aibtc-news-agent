name: AIBTC News Agent

on:
  schedule:
    # 12 slots per UTC day — every 2 hours
    - cron: "0 0 * * *"   # slot 1  — midnight sweep
    - cron: "0 2 * * *"   # slot 2  — early research
    - cron: "0 4 * * *"   # slot 3  — pre-market
    - cron: "0 6 * * *"   # slot 4  — arxiv + papers
    - cron: "0 8 * * *"   # slot 5  — beat sweep
    - cron: "0 10 * * *"  # slot 6  — on-chain data
    - cron: "0 12 * * *"  # slot 7  — midday beat
    - cron: "0 14 * * *"  # slot 8  — market update
    - cron: "0 16 * * *"  # slot 9  — US session scout
    - cron: "0 18 * * *"  # slot 10 — beat sweep
    - cron: "0 20 * * *"  # slot 11 — deal flow
    - cron: "0 22 * * *"  # slot 12 — daily wrap
  workflow_dispatch:
    inputs:
      slot_override:
        description: "Force a specific slot (1–12). Leave blank to auto-detect from UTC hour."
        required: false
        default: ""

permissions:
  contents: write

jobs:
  file-signal:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      BTC_ADDRESS: ${{ secrets.BTC_ADDRESS }}
      STX_ADDRESS: ${{ secrets.STX_ADDRESS }}
      WALLET_PASSWORD: ${{ secrets.WALLET_PASSWORD }}
      AGENT_BEAT: ${{ secrets.AGENT_BEAT }}
      AGENT_PRIMARY_SKILL: ${{ secrets.AGENT_PRIMARY_SKILL }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: |
          npm install -g @anthropic-ai/claude-code @aibtc/mcp-server@latest
          npx @aibtc/mcp-server@latest --install
          pip install anthropic requests feedparser --quiet

      - name: Restore wallet
        run: |
          mkdir -p ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1
          echo '${{ secrets.WALLET_CONFIG_JSON }}' > ~/.aibtc/config.json
          echo '${{ secrets.WALLET_INDEX_JSON }}' > ~/.aibtc/wallets.json
          echo '${{ secrets.WALLET_KEYSTORE_JSON }}' > ~/.aibtc/wallets/e0704dea-0eca-4a02-a964-b7259606cbc1/keystore.json

      - name: Detect slot from UTC hour
        id: slot
        run: |
          if [ -n "${{ github.event.inputs.slot_override }}" ]; then
            echo "slot=${{ github.event.inputs.slot_override }}" >> $GITHUB_OUTPUT
          else
            HOUR=$(date -u +%H | sed 's/^0//')
            case $HOUR in
              0)  echo "slot=1"  >> $GITHUB_OUTPUT ;;
              2)  echo "slot=2"  >> $GITHUB_OUTPUT ;;
              4)  echo "slot=3"  >> $GITHUB_OUTPUT ;;
              6)  echo "slot=4"  >> $GITHUB_OUTPUT ;;
              8)  echo "slot=5"  >> $GITHUB_OUTPUT ;;
              10) echo "slot=6"  >> $GITHUB_OUTPUT ;;
              12) echo "slot=7"  >> $GITHUB_OUTPUT ;;
              14) echo "slot=8"  >> $GITHUB_OUTPUT ;;
              16) echo "slot=9"  >> $GITHUB_OUTPUT ;;
              18) echo "slot=10" >> $GITHUB_OUTPUT ;;
              20) echo "slot=11" >> $GITHUB_OUTPUT ;;
              22) echo "slot=12" >> $GITHUB_OUTPUT ;;
              *)  echo "slot=0"  >> $GITHUB_OUTPUT ;;
            esac
          fi

      - name: Scrape news sources
        if: steps.slot.outputs.slot != '0'
        run: |
          python scripts/scrape_sources.py \
            --slot ${{ steps.slot.outputs.slot }} \
            --beat "$AGENT_BEAT" \
            --output raw_sources.json

      - name: Run agent — research, fact-check, write, submit
        if: steps.slot.outputs.slot != '0'
        run: |
          python scripts/run_agent.py \
            --slot ${{ steps.slot.outputs.slot }} \
            --sources raw_sources.json \
            --beat "$AGENT_BEAT" \
            --primary-skill "$AGENT_PRIMARY_SKILL" \
            --btc-address "$BTC_ADDRESS" \
            --log news-log.md

      - name: Commit updated log
        if: steps.slot.outputs.slot != '0'
        run: |
          git config user.name "aibtc-news-agent"
          git config user.email "agent@noreply"
          git add news-log.md
          git diff --cached --quiet || git commit -m "signal log: slot ${{ steps.slot.outputs.slot }} $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
